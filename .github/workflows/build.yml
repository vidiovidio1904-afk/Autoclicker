name: Build AutoClicker EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name "AdvancedAutoClicker" advanced_autoclicker.py
        
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: AdvancedAutoClicker
        path: dist/AdvancedAutoClicker.exe
        retention-days: 30
