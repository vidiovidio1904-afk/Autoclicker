name: Build AutoClicker EXE

on:
  push:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name AutoClicker advanced_autoclicker.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: AutoClicker
          path: dist/AutoClicker.exe
